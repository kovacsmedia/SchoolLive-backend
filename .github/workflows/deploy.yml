name: Deploy backend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload backend to server (rsync)
        continue-on-error: true
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --ignore-errors --exclude='.git' --exclude='node_modules' --exclude='.env' --exclude='dist' --exclude='uploads' --exclude='audio'
          path: ./
          remote_path: /opt/schoollive/backend
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Install, migrate, build and restart (PM2)
        if: always()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            cd /opt/schoollive/backend

            echo "== Node version =="
            node -v || true
            npm -v || true

            echo "== Fix node_modules permissions =="
            sudo chown -R deploy:deploy /opt/schoollive/backend/node_modules || true

            echo "== Install deps =="
            npm install

            # .env betöltése
            if [ -f ".env" ]; then
              echo "== Loading .env =="
              set -a
              . ./.env
              set +a
            else
              echo "WARNING: .env not found on server!"
            fi

            echo "== Prisma generate =="
            npx prisma generate

            echo "== Prisma migrate deploy =="
            npx prisma migrate deploy

            echo "== Build =="
            npm run build

            echo "== Create audio/upload dirs =="
            mkdir -p /opt/schoollive/backend/audio/bells
            chmod 755 /opt/schoollive/backend/audio/bells
            mkdir -p /opt/schoollive/backend/uploads/radio
            chmod 755 /opt/schoollive/backend/uploads/radio

            echo "== yt-dlp frissítés =="
            if command -v yt-dlp &>/dev/null; then
              yt-dlp -U || true
            else
              pip install yt-dlp --break-system-packages --quiet || \
              curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
                -o /usr/local/bin/yt-dlp && chmod +x /usr/local/bin/yt-dlp || true
            fi

            echo "== PM2 start/reload =="
            if pm2 describe schoollive-api >/dev/null 2>&1; then
              pm2 reload schoollive-api
            else
              pm2 start dist/server.js --name schoollive-api
            fi

            echo "== PM2 save =="
            pm2 save